{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Gestión de Usuarios</h2>
    <a href="/usuarios/crear/" class="btn btn-primary">Nuevo usuario</a>
</div>

<form method="get" class="row g-2 mb-3">
    <div class="col-md-10">
        <input type="text" name="busqueda" class="form-control" placeholder="Buscar por nombre o correo" value="{{ busqueda }}">
    </div>
    <div class="col-md-2 d-grid">
        <button type="submit" class="btn btn-secondary">Buscar</button>
    </div>
</form>

<div class="card shadow-sm border-0">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-bordered table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>Nombre</th>
                        <th>Correo</th>
                        <th>Teléfono</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    {% for usuario in usuarios %}
                    <tr>
                        <td>{{ usuario.nombre }}</td>
                        <td>{{ usuario.correo }}</td>
                        <td>{{ usuario.telefono }}</td>
                        <td>
                            <a href="/usuarios/editar/{{ usuario.id }}/" class="btn btn-warning btn-sm">Editar</a>
                            <a href="/usuarios/eliminar/{{ usuario.id }}/" class="btn btn-danger btn-sm" onclick="return confirm('¿Seguro que deseas eliminar este usuario?')">Eliminar</a>
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="4" class="text-center">No hay usuarios registrados.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
