{% extends 'base.html' %}

{% block content %}
<div class="card shadow-sm border-0">
    <div class="card-body">
        <h2 class="mb-4">Editar Libro</h2>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Título</label>
                <input type="text" name="titulo" class="form-control" value="{{ libro.titulo }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Autor</label>
                <input type="text" name="autor" class="form-control" value="{{ libro.autor }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">ISBN</label>
                <input type="text" name="isbn" class="form-control" value="{{ libro.isbn }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Editorial</label>
                <input type="text" name="editorial" class="form-control" value="{{ libro.editorial }}">
            </div>
            <div class="mb-3">
                <label class="form-label">Año de publicación</label>
                <input type="number" name="anio_publicacion" class="form-control" value="{{ libro.anio_publicacion }}" required>
            </div>
            <div class="form-check mb-3">
                <input type="checkbox" name="disponible" class="form-check-input" id="disponible" {% if libro.disponible %}checked{% endif %}>
                <label class="form-check-label" for="disponible">Disponible</label>
            </div>
            <button type="submit" class="btn btn-success">Actualizar</button>
            <a href="/libros/" class="btn btn-secondary">Volver</a>
        </form>
    </div>
</div>
{% endblock %}
